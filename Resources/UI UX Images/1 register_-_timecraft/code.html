<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register | TimeCraft - Luxury Horology</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e0ac29",
                        "background-light": "#f8f7f6",
                        "background-dark": "#121212",
                        "surface-dark": "#1e1e1e",
                        "border-dark": "#332f25",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
        .luxury-gradient {
            background: radial-gradient(circle at center, #26231c 0%, #121212 100%);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-white min-h-screen flex flex-col luxury-gradient">
<!-- Top Navigation Placeholder -->
<header class="w-full px-6 py-8 flex justify-between items-center max-w-7xl mx-auto">
<div class="flex items-center gap-2">
<div class="text-primary">
<span class="material-symbols-outlined text-4xl">watch</span>
</div>
<h1 class="text-2xl font-extrabold tracking-tighter text-white uppercase">TimeCraft</h1>
</div>
<a class="text-sm font-semibold text-primary/80 hover:text-primary transition-colors" href="#">
            Back to Shop
        </a>
</header>
<main class="flex-1 flex items-center justify-center p-6">
<!-- Registration Card -->
<div class="w-full max-w-[540px] bg-surface-dark border border-border-dark rounded-xl shadow-2xl p-8 md:p-12 relative overflow-hidden">
<!-- Subtle Decorative Element -->
<div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-full blur-3xl -mr-16 -mt-16"></div>
<div class="relative z-10">
<div class="text-center mb-10">
<h2 class="text-3xl font-bold tracking-tight text-white mb-2">Start Your Journey</h2>
<p class="text-primary/60 text-sm font-medium uppercase tracking-widest">Experience Precision &amp; Luxury</p>
</div>
<form class="space-y-5">
<!-- Full Name -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-wider text-gray-400 ml-1">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-xl">person</span>
<input class="w-full bg-background-dark/50 border border-border-dark rounded-lg py-4 pl-12 pr-4 text-white placeholder:text-gray-600 focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all outline-none" placeholder="Alexander Thorne" type="text"/>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-5">
<!-- Email -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-wider text-gray-400 ml-1">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-xl">mail</span>
<input class="w-full bg-background-dark/50 border border-border-dark rounded-lg py-4 pl-12 pr-4 text-white placeholder:text-gray-600 focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all outline-none" placeholder="alex@luxury.com" type="email"/>
</div>
</div>
<!-- Phone -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-wider text-gray-400 ml-1">Phone Number</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-xl">call</span>
<input class="w-full bg-background-dark/50 border border-border-dark rounded-lg py-4 pl-12 pr-4 text-white placeholder:text-gray-600 focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all outline-none" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
</div>
<!-- Role Selection -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-wider text-gray-400 ml-1">Account Type</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-xl">badge</span>
<select class="w-full bg-background-dark/50 border border-border-dark rounded-lg py-4 pl-12 pr-10 text-white appearance-none focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all outline-none cursor-pointer">
<option selected="" value="customer">Customer</option>
<option value="collector">Private Collector</option>
<option value="dealer">Authorized Dealer</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none">expand_more</span>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-5">
<!-- Password -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-wider text-gray-400 ml-1">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-xl">lock</span>
<input class="w-full bg-background-dark/50 border border-border-dark rounded-lg py-4 pl-12 pr-4 text-white placeholder:text-gray-600 focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all outline-none" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Confirm Password -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-wider text-gray-400 ml-1">Confirm</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-xl">lock_reset</span>
<input class="w-full bg-background-dark/50 border border-border-dark rounded-lg py-4 pl-12 pr-4 text-white placeholder:text-gray-600 focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all outline-none" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<!-- Submit Button -->
<div class="pt-6">
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold py-4 rounded-lg shadow-lg shadow-primary/10 transition-all flex items-center justify-center gap-2 group" type="submit">
                            CREATE ACCOUNT
                            <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
<div class="text-center pt-4">
<p class="text-gray-500 text-sm">
                            Already have an account? 
                            <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">Log in here</a>
</p>
</div>
</form>
</div>
</div>
</main>
<!-- Simple Footer -->
<footer class="w-full py-8 text-center">
<div class="flex justify-center gap-6 mb-4">
<a class="text-gray-600 hover:text-primary transition-colors text-xs font-bold uppercase tracking-widest" href="#">Terms</a>
<a class="text-gray-600 hover:text-primary transition-colors text-xs font-bold uppercase tracking-widest" href="#">Privacy</a>
<a class="text-gray-600 hover:text-primary transition-colors text-xs font-bold uppercase tracking-widest" href="#">Help</a>
</div>
<p class="text-gray-700 text-[10px] uppercase tracking-[0.2em]">© 2024 TimeCraft Horology. All Rights Reserved.</p>
</footer>
<!-- Background Image / Texture -->
<div class="fixed inset-0 pointer-events-none opacity-10 z-[-1]" data-alt="Detailed macro shot of luxury watch gears and clockwork mechanisms" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAQy1NL2SICcKm6YMvdkmVKntRPAM5tAINICQnLth20FAS-F8Zz5JlJAkB9uiQWDLsarMmCU2EUAR4dyydArzLuBHTU9RD1ph1FqPqe1VwupplWHUvtSOZMvrCVEMqtE2sCdIgaUObJr7qwo31Hwyt2rjeqbG0y91XvApYfyVT4hBHORpgzavxmhWhRhlTBL17ZO41i5a-s4MJMOcYKOxxSjlPtqSCnrEt6Q-z1_FZa6ucRBwNTKQtdb5wDMROot9FHGZ3GzEkVSalh'); background-size: cover; background-position: center;">
</div>
</body></html>
